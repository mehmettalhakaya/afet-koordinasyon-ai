version: "3.9"

services:
  backend:
    build: ./backend
    container_name: afet-backend
    ports:
      - "8000:8000"
    volumes:
      - afet-db:/app
    environment:
      - AFET_DB_PATH=/app/afet.db
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: afet-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  afet-db:
