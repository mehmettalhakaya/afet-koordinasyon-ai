server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # Backend container'a proxy
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
  }
  location /health {
    proxy_pass http://backend:8000/health;
  }
}
